name: Update AltStore Source

on:
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update-source:
    name: Regenerate and deploy altstore.json
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate AltStore source JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p pages
          python3 .github/scripts/generate-altstore-source.py > pages/altstore.json
          cat pages/altstore.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          publish_branch: gh-pages
          commit_message: "Update AltStore source"
