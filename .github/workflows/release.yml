name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write
  pages: write

jobs:
  build-and-release:
    name: Build unsigned IPA and publish
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Build archive (unsigned)
        shell: bash
        run: |
          set -o pipefail
          xcodebuild archive \
            -project NearbyGlasses/NearbyGlasses.xcodeproj \
            -scheme NearbyGlasses \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/NearbyGlasses.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty

      - name: Package IPA
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p Payload
          cp -r build/NearbyGlasses.xcarchive/Products/Applications/NearbyGlasses.app Payload/
          zip -r "NearbyGlasses-${VERSION}.ipa" Payload/

      - name: Generate SHA256 checksum
        run: |
          VERSION="${{ github.ref_name }}"
          shasum -a 256 "NearbyGlasses-${VERSION}.ipa" > "NearbyGlasses-${VERSION}.ipa.sha256"
          cat "NearbyGlasses-${VERSION}.ipa.sha256"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: NearbyGlasses-${{ github.ref_name }}.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nearby Glasses ${{ github.ref_name }}"
          body: |
            ## Installation
            Sideload with [AltStore](https://altstore.io), [SideStore](https://sidestore.io),
            or [Sideloadly](https://sideloadly.io). This is an **unsigned IPA** — AltStore/SideStore
            will re-sign it with your Apple ID.

            ## Verify integrity
            ```
            shasum -a 256 -c NearbyGlasses-${{ github.ref_name }}.ipa.sha256
            ```
            [SLSA provenance attestation](https://github.com/${{ github.repository }}/attestations)
            is also available.
          files: |
            NearbyGlasses-${{ github.ref_name }}.ipa
            NearbyGlasses-${{ github.ref_name }}.ipa.sha256
          fail_on_unmatched_files: true

      # AltStore source is NOT updated here.
      # It is updated separately by update-altstore-source.yml,
      # which fires when the user edits the release body on GitHub.
